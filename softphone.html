<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>软电话 - SoftPhone</title>
    <!-- TailwindCSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- AlpineJS CDN -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .dial-btn:active { transform: scale(0.95); }
        .glass-effect {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .dark .glass-effect {
            background: rgba(30, 41, 59, 0.85);
        }
        .call-wave {
            animation: wave 2s ease-in-out infinite;
        }
        @keyframes wave {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }
        .pulse-ring {
            animation: pulse-ring 1.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }
        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                        },
                        success: { 500: '#22c55e', 600: '#16a34a' },
                        danger: { 500: '#ef4444', 600: '#dc2626' },
                        warning: { 500: '#f59e0b', 600: '#d97706' },
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gradient-to-br from-slate-100 to-slate-200 dark:from-slate-900 dark:to-slate-800 min-h-screen flex items-center justify-center p-4 transition-colors duration-300"
      x-data="softphone()" 
      x-init="initApp()">

    <!-- Main Phone Container -->
    <div class="w-full max-w-md glass-effect rounded-3xl shadow-2xl overflow-hidden border border-white/20 dark:border-slate-700/50">
        
        <!-- Header -->
        <div class="bg-gradient-to-r from-primary-600 to-primary-700 text-white px-6 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center">
                        <i data-lucide="phone" class="w-5 h-5"></i>
                    </div>
                    <div>
                        <h1 class="font-semibold text-lg">软电话</h1>
                        <p class="text-xs text-blue-100" x-text="statusText"></p>
                    </div>
                </div>
                <button @click="toggleDarkMode()" 
                        class="p-2 rounded-full hover:bg-white/20 transition-colors"
                        aria-label="切换主题">
                    <i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i>
                    <i data-lucide="moon" class="w-5 h-5 block dark:hidden"></i>
                </button>
            </div>
        </div>

        <!-- Display Screen -->
        <div class="px-6 pt-6 pb-2">
            <div class="bg-slate-50 dark:bg-slate-800/50 rounded-2xl p-4 min-h-[100px] flex flex-col justify-center items-center border border-slate-200 dark:border-slate-700">
                <!-- Call Timer (when in call) -->
                <div x-show="callState === 'connected'" 
                     x-transition
                     class="text-3xl font-mono font-semibold text-slate-700 dark:text-slate-200 mb-1">
                    <span x-text="formatTime(callDuration)"></span>
                </div>
                
                <!-- Phone Number Input -->
                <input type="text" 
                       x-model="phoneNumber" 
                       @keydown="handleKeydown($event)"
                       placeholder="输入号码"
                       class="w-full text-center text-3xl font-light bg-transparent border-none outline-none text-slate-800 dark:text-slate-100 placeholder-slate-400"
                       :readonly="callState !== 'idle'"
                       x-ref="phoneInput">
                
                <!-- Contact Name (if found) -->
                <p x-show="contactName && phoneNumber" 
                   x-text="contactName"
                   class="text-sm text-primary-600 dark:text-primary-400 mt-1 font-medium"></p>
            </div>
        </div>

        <!-- Quick Actions (In Call) -->
        <div x-show="callState === 'connected'" 
             x-transition
             class="px-6 py-2 flex justify-center gap-4">
            <button @click="toggleMute()" 
                    :class="isMuted ? 'bg-warning-500 text-white' : 'bg-slate-200 dark:bg-slate-700 text-slate-600 dark:text-slate-300'"
                    class="w-12 h-12 rounded-full flex items-center justify-center transition-all hover:scale-110">
                <i data-lucide="mic-off" class="w-5 h-5" x-show="isMuted"></i>
                <i data-lucide="mic" class="w-5 h-5" x-show="!isMuted"></i>
            </button>
            <button @click="toggleSpeaker()" 
                    :class="isSpeakerOn ? 'bg-primary-500 text-white' : 'bg-slate-200 dark:bg-slate-700 text-slate-600 dark:text-slate-300'"
                    class="w-12 h-12 rounded-full flex items-center justify-center transition-all hover:scale-110">
                <i data-lucide="volume-2" class="w-5 h-5"></i>
            </button>
            <button @click="toggleHold()" 
                    :class="isOnHold ? 'bg-warning-500 text-white' : 'bg-slate-200 dark:bg-slate-700 text-slate-600 dark:text-slate-300'"
                    class="w-12 h-12 rounded-full flex items-center justify-center transition-all hover:scale-110">
                <i data-lucide="pause" class="w-5 h-5"></i>
            </button>
            <button @click="showKeypad = !showKeypad" 
                    :class="showKeypad ? 'bg-primary-500 text-white' : 'bg-slate-200 dark:bg-slate-700 text-slate-600 dark:text-slate-300'"
                    class="w-12 h-12 rounded-full flex items-center justify-center transition-all hover:scale-110">
                <i data-lucide="grid-3x3" class="w-5 h-5"></i>
            </button>
        </div>

        <!-- DTMF Keypad -->
        <div x-show="showKeypad || callState === 'idle'" 
             x-transition
             class="px-6 py-4">
            <div class="grid grid-cols-3 gap-3">
                <template x-for="key in dialKeys" :key="key.digit">
                    <button @click="pressKey(key.digit)"
                            class="dial-btn aspect-square rounded-2xl bg-white dark:bg-slate-700 shadow-sm border border-slate-200 dark:border-slate-600 hover:shadow-md hover:bg-slate-50 dark:hover:bg-slate-600 transition-all flex flex-col items-center justify-center group">
                        <span class="text-2xl font-semibold text-slate-700 dark:text-slate-200 group-hover:text-primary-600 dark:group-hover:text-primary-400" 
                              x-text="key.digit"></span>
                        <span class="text-[10px] text-slate-400 dark:text-slate-500 uppercase tracking-wider" 
                              x-text="key.letters"></span>
                    </button>
                </template>
                
                <!-- Special Keys Row -->
                <button @click="pressKey('*')" 
                        class="dial-btn aspect-square rounded-2xl bg-white dark:bg-slate-700 shadow-sm border border-slate-200 dark:border-slate-600 hover:shadow-md transition-all flex items-center justify-center">
                    <span class="text-2xl font-semibold text-slate-700 dark:text-slate-200">*</span>
                </button>
                <button @click="pressKey('0')" 
                        class="dial-btn aspect-square rounded-2xl bg-white dark:bg-slate-700 shadow-sm border border-slate-200 dark:border-slate-600 hover:shadow-md transition-all flex flex-col items-center justify-center">
                    <span class="text-2xl font-semibold text-slate-700 dark:text-slate-200">0</span>
                    <span class="text-[10px] text-slate-400 dark:text-slate-500">+</span>
                </button>
                <button @click="pressKey('#')" 
                        class="dial-btn aspect-square rounded-2xl bg-white dark:bg-slate-700 shadow-sm border border-slate-200 dark:border-slate-600 hover:shadow-md transition-all flex items-center justify-center">
                    <span class="text-2xl font-semibold text-slate-700 dark:text-slate-200">#</span>
                </button>
            </div>
        </div>

        <!-- Call Controls -->
        <div class="px-6 pb-6 pt-2">
            <div class="flex items-center justify-center gap-4">
                <!-- Clear/Backspace Button -->
                <button x-show="phoneNumber.length > 0 && callState === 'idle'"
                        @click="backspace()"
                        class="w-14 h-14 rounded-full bg-slate-200 dark:bg-slate-700 text-slate-600 dark:text-slate-300 flex items-center justify-center hover:bg-slate-300 dark:hover:bg-slate-600 transition-all active:scale-95">
                    <i data-lucide="delete" class="w-6 h-6"></i>
                </button>

                <!-- Main Call Button -->
                <button x-show="callState === 'idle'"
                        @click="makeCall()"
                        :disabled="!phoneNumber"
                        :class="phoneNumber ? 'bg-success-500 hover:bg-success-600 shadow-lg shadow-green-500/30' : 'bg-slate-300 cursor-not-allowed'"
                        class="w-20 h-20 rounded-full text-white flex items-center justify-center transition-all transform hover:scale-105 active:scale-95 call-wave">
                    <i data-lucide="phone" class="w-8 h-8"></i>
                </button>

                <!-- Incoming Call Actions -->
                <template x-if="callState === 'incoming'">
                    <div class="flex gap-4">
                        <button @click="rejectCall()"
                                class="w-16 h-16 rounded-full bg-danger-500 hover:bg-danger-600 text-white flex items-center justify-center transition-all shadow-lg shadow-red-500/30">
                            <i data-lucide="phone-off" class="w-7 h-7"></i>
                        </button>
                        <div class="relative">
                            <div class="absolute inset-0 bg-success-500 rounded-full pulse-ring"></div>
                            <button @click="answerCall()"
                                    class="relative w-16 h-16 rounded-full bg-success-500 hover:bg-success-600 text-white flex items-center justify-center transition-all shadow-lg shadow-green-500/30">
                                <i data-lucide="phone" class="w-7 h-7"></i>
                            </button>
                        </div>
                    </div>
                </template>

                <!-- End Call Button -->
                <button x-show="callState === 'connected' || callState === 'dialing'"
                        @click="endCall()"
                        class="w-20 h-20 rounded-full bg-danger-500 hover:bg-danger-600 text-white flex items-center justify-center transition-all transform hover:scale-105 active:scale-95 shadow-lg shadow-red-500/30">
                    <i data-lucide="phone-off" class="w-8 h-8"></i>
                </button>

                <!-- Add Contact Button -->
                <button x-show="phoneNumber.length > 0 && callState === 'idle'"
                        @click="addToContacts()"
                        class="w-14 h-14 rounded-full bg-slate-200 dark:bg-slate-700 text-slate-600 dark:text-slate-300 flex items-center justify-center hover:bg-slate-300 dark:hover:bg-slate-600 transition-all active:scale-95">
                    <i data-lucide="user-plus" class="w-6 h-6"></i>
                </button>
            </div>
        </div>

        <!-- Tabs Section -->
        <div class="border-t border-slate-200 dark:border-slate-700 bg-slate-50/50 dark:bg-slate-800/50">
            <!-- Tab Headers -->
            <div class="flex border-b border-slate-200 dark:border-slate-700">
                <button @click="activeTab = 'recent'" 
                        :class="activeTab === 'recent' ? 'text-primary-600 border-b-2 border-primary-600' : 'text-slate-500'"
                        class="flex-1 py-3 text-sm font-medium transition-colors flex items-center justify-center gap-2">
                    <i data-lucide="clock" class="w-4 h-4"></i>
                    最近通话
                </button>
                <button @click="activeTab = 'contacts'" 
                        :class="activeTab === 'contacts' ? 'text-primary-600 border-b-2 border-primary-600' : 'text-slate-500'"
                        class="flex-1 py-3 text-sm font-medium transition-colors flex items-center justify-center gap-2">
                    <i data-lucide="users" class="w-4 h-4"></i>
                    联系人
                </button>
                <button @click="activeTab = 'voicemail'" 
                        :class="activeTab === 'voicemail' ? 'text-primary-600 border-b-2 border-primary-600' : 'text-slate-500'"
                        class="flex-1 py-3 text-sm font-medium transition-colors flex items-center justify-center gap-2">
                    <i data-lucide="voicemail" class="w-4 h-4"></i>
                    语音信箱
                </button>
            </div>

            <!-- Recent Calls List -->
            <div x-show="activeTab === 'recent'" class="max-h-48 overflow-y-auto">
                <template x-for="call in recentCalls" :key="call.id">
                    <div @click="callNumber(call.number)"
                         class="flex items-center justify-between px-4 py-3 hover:bg-white dark:hover:bg-slate-700/50 cursor-pointer transition-colors border-b border-slate-100 dark:border-slate-700/50 last:border-0">
                        <div class="flex items-center gap-3">
                            <div :class="call.type === 'missed' ? 'text-danger-500' : call.type === 'outgoing' ? 'text-success-500' : 'text-primary-500'">
                                <i :data-lucide="call.type === 'missed' ? 'phone-missed' : call.type === 'outgoing' ? 'phone-outgoing' : 'phone-incoming'" 
                                   class="w-5 h-5"></i>
                            </div>
                            <div>
                                <p class="font-medium text-slate-800 dark:text-slate-200" x-text="call.name || call.number"></p>
                                <p class="text-xs text-slate-500" x-text="call.time"></p>
                            </div>
                        </div>
